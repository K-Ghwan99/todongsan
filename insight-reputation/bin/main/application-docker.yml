spring:
  application:
    name: insight-reputation-service

  http:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    defer-datasource-initialization: false
  
  sql:
    init:
      mode: never

server:
  port: 8083

# Actuator Configuration for Health Check
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  health:
    defaults:
      enabled: true

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type: WARN
    com.todongsan.insightreputation: INFO
  file:
    path: /app/logs

reb:
  api:
    key: ${REB_API_KEY}
    base-url: ${REB_API_BASE_URL}

claude:
  api:
    key: ${CLAUDE_API_KEY}
    url: ${CLAUDE_API_URL}
    model: ${CLAUDE_MODEL}

client:
  battle:
    base-url: ${BATTLE_SERVICE_BASE_URL}
  member-point:
    base-url: ${MEMBER_POINT_SERVICE_BASE_URL}
  market:
    base-url: ${MARKET_SERVICE_BASE_URL}