spring:
  application:
    name: insight-reputation-service
  
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    defer-datasource-initialization: false
  
  sql:
    init:
      mode: never

server:
  port: 8084

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type: INFO
    com.todongsan.insightreputation: DEBUG

reb:
  api:
    key: ${REB_API_KEY}
    base-url: ${REB_API_BASE_URL}

claude:
  api:
    key: ${CLAUDE_API_KEY}
    url: ${CLAUDE_API_URL}
    model: ${CLAUDE_MODEL}

client:
  battle:
    base-url: ${BATTLE_SERVICE_BASE_URL:http://battle-service}
  member-point:
    base-url: ${MEMBER_POINT_SERVICE_BASE_URL:http://member-point-service}