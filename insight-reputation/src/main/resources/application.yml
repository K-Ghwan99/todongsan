spring:
  application:
    name: insight-reputation-service

  # HTTP 응답 Content-Type 에 charset=UTF-8 을 강제 포함시킨다.
  # 없으면 application/json 응답을 일부 클라이언트가 ISO-8859-1 로 해석해 한국어가 깨진다.
  http:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    defer-datasource-initialization: false
  
  sql:
    init:
      mode: never

server:
  port: 8083

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type: INFO
    com.todongsan.insightreputation: DEBUG

reb:
  api:
    key: ${REB_API_KEY}
    base-url: ${REB_API_BASE_URL}

claude:
  api:
    key: ${CLAUDE_API_KEY}
    url: ${CLAUDE_API_URL}
    model: ${CLAUDE_MODEL}

client:
  battle:
    base-url: ${BATTLE_SERVICE_BASE_URL:http://battle-service}
    internal-auth-token: ${BATTLE_INTERNAL_AUTH_TOKEN}
  member-point:
    base-url: ${MEMBER_POINT_SERVICE_BASE_URL:http://member-point-service}
  market:
    base-url: ${MARKET_SERVICE_BASE_URL:http://localhost:8082}
    internal-auth-token: ${MARKET_INTERNAL_AUTH_TOKEN:local-internal-token}