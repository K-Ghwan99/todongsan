spring:
  application:
    name: insight-reputation-service
  
  datasource:
    url: jdbc:mysql://localhost:3307/insight?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    defer-datasource-initialization: false
  
  sql:
    init:
      mode: never

server:
  port: 8084

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type: INFO
    com.todongsan.insightreputation: DEBUG

reb:
  api:
    key: ${REB_API_KEY}
    base-url: ${REB_API_BASE_URL}