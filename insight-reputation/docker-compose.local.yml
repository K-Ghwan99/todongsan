services:
  insight-reputation-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: todongsan/insight-reputation-service:local
    container_name: insight-reputation-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    env_file:
      - path: .env.local
        required: false
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://todongsan-mysql:3306/insight?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: 1234
      # REB_API_KEY, REB_API_BASE_URL — .env.local 에서 주입
      # CLAUDE_API_KEY, CLAUDE_API_URL, CLAUDE_MODEL — .env.local 에서 주입
      BATTLE_SERVICE_BASE_URL: http://battle-service:8081
      MEMBER_POINT_SERVICE_BASE_URL: http://member-point-service:8080
      MARKET_SERVICE_BASE_URL: http://market-service:8082
    networks:
      - todongsan-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    volumes:
      - ./logs:/app/logs

networks:
  todongsan-network:
    external: true
