version: '3.8'

services:
  # Insight Reputation Service (External MySQL)
  insight-reputation-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insight-reputation-service-local
    restart: unless-stopped
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      # Application Profile
      SPRING_PROFILES_ACTIVE: docker
      
      # Service Communication URLs (for local testing)
      BATTLE_SERVICE_BASE_URL: http://localhost:8081
      MEMBER_POINT_SERVICE_BASE_URL: http://localhost:8084
      MARKET_SERVICE_BASE_URL: http://localhost:8082
    networks:
      - infra_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    volumes:
      - ./logs:/app/logs

networks:
  infra_default:
    external: true