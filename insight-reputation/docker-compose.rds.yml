version: '3.8'

services:
  # Insight Reputation Service (RDS)
  insight-reputation-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insight-reputation-service-rds
    restart: unless-stopped
    ports:
      - "8083:8083"
    env_file:
      - .env
    networks:
      - insight-rds-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    volumes:
      - ./logs:/app/logs
    environment:
      # Application Profile
      SPRING_PROFILES_ACTIVE: docker

networks:
  insight-rds-network:
    driver: bridge