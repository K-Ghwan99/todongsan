services:
  mysql:
    image: mysql:8.4
    container_name: todongsan-mysql
    restart: unless-stopped

    ports:
      - "3307:3306"

    environment:
      MYSQL_ROOT_PASSWORD: 1234
      TZ: Asia/Seoul

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    volumes:
      - todongsan_mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d

    networks:
      - todongsan-network

volumes:
  todongsan_mysql_data:

networks:
  todongsan-network:
    name: todongsan-network
    driver: bridge
