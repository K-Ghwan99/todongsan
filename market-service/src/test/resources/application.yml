spring:
  datasource:
    url: jdbc:h2:mem:market_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

client:
  member-point:
    mode: fake
    base-url: http://localhost:8080
    connect-timeout-millis: 3000
    read-timeout-millis: 5000

market:
  scheduler:
    prediction-reconciliation:
      enabled: false
    settlement-retry:
      enabled: false
    refund-retry:
      enabled: false
    reputation-update:
      enabled: false
