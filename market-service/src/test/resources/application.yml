spring:
  datasource:
    url: jdbc:h2:mem:market_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

market:
  scheduler:
    prediction-reconciliation:
      enabled: false
    settlement-retry:
      enabled: false
    refund-retry:
      enabled: false
