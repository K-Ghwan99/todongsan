spring:
  application:
    name: market-service
  profiles:
    default: local
  cloud:
    openfeign:
      client:
        config:
          member-point-internal:
            connectTimeout: ${MEMBER_POINT_CONNECT_TIMEOUT_MILLIS:3000}
            readTimeout: ${MEMBER_POINT_READ_TIMEOUT_MILLIS:5000}
          insight-reputation-internal:
            connectTimeout: ${INSIGHT_CONNECT_TIMEOUT_MILLIS:3000}
            readTimeout: ${INSIGHT_READ_TIMEOUT_MILLIS:5000}

server:
  port: ${SERVER_PORT:8082}

client:
  member-point:
    mode: ${MEMBER_POINT_CLIENT_MODE:fake}
    base-url: ${MEMBER_POINT_SERVICE_URL:http://localhost:8080}
    connect-timeout-millis: ${MEMBER_POINT_CONNECT_TIMEOUT_MILLIS:3000}
    read-timeout-millis: ${MEMBER_POINT_READ_TIMEOUT_MILLIS:5000}
  insight:
    mode: ${INSIGHT_CLIENT_MODE:fake}
    base-url: ${INSIGHT_SERVICE_URL:http://localhost:8083}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

market:
  scheduler:
    prediction-reconciliation:
      enabled: true
      fixed-delay-ms: 60000
      limit: 100
    settlement-retry:
      enabled: true
      fixed-delay-ms: 180000
      limit: 50
    refund-retry:
      enabled: true
      fixed-delay-ms: 180000
      limit: 50
